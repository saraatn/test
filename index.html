<style>
  /* Welcome Landing Page Overlay Layout Styling - Updated to PNG Asset */
  #welcome-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #0f172a url('img/rp coi background.png') no-repeat center center;
    background-size: cover;
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    font-family: sans-serif;
    transition: opacity 0.6s ease;
  }
  
  #welcome-overlay::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(15, 23, 42, 0.5); /* Ambient backdrop tint */
    z-index: 1;
  }

  /* Translucent Form Card Frame (65% Opacity) */
  .form-card {
    position: relative;
    z-index: 2;
    background: rgba(30, 41, 59, 0.65);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 35px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    width: 90%;
    max-width: 400px;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    text-align: center;
  }

  /* Typewriter Text Header Target Container */
  .form-card h2 { 
    margin-bottom: 25px; 
    font-size: 24px; 
    font-weight: 600; 
    color: #fff;
    min-height: 32px; 
    display: inline-block;
    border-right: 2px solid rgba(255,255,255,0.75);
    white-space: nowrap;
    overflow: hidden;
    animation: blink-caret 0.75s step-end infinite;
  }

  .form-group { margin-bottom: 20px; text-align: left; }
  .form-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #cbd5e1; font-weight: 500; }
  .form-group input {
    width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #475569;
    background: rgba(15, 23, 42, 0.6); color: #fff; box-sizing: border-box; font-size: 14px;
    transition: border-color 0.2s;
  }
  .form-group input:focus { outline: none; border-color: #008453; }

  /* Submit Button - Restored to Muted RP Corporate Green */
  .submit-btn {
    width: 100%; padding: 12px; 
    background: #008453; /* Deep Muted RP Green */
    border: none;
    border-radius: 6px; color: #fff; font-weight: 600; cursor: pointer;
    font-size: 15px; margin-top: 10px; transition: background 0.2s;
  }
  .submit-btn:hover { background: #006b42; }
  #welcome-overlay.fade-out { opacity: 0; pointer-events: none; }

  /* Keyframes for the typewriter cursor effect */
  @keyframes blink-caret {
    from, to { border-color: transparent }
    50% { border-color: rgba(255,255,255,0.75); }
  }
</style>

<div id="welcome-overlay">
  <div class="form-card">
    <h2 id="dynamic-lites-title"></h2>
    <form onsubmit="handleFormSubmit(event)">
      <div class="form-group">
        <label for="guest-name">Full Name</label>
        <input type="text" id="guest-name" required placeholder="John Doe">
      </div>
      <div class="form-group">
        <label for="guest-org">Organisation</label>
        <input type="text" id="guest-org" required placeholder="Company Name">
      </div>
      <div class="form-group">
        <label for="guest-designation">Designation / Job Title</label>
        <input type="text" id="guest-designation" required placeholder="Operations Manager">
      </div>
      <button type="submit" class="submit-btn">Welcome! Enter the experience</button>
    </form>
  </div>
</div>
