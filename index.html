<script>
  // Track using the actual IDs present in your HTML side menu
  const standardStations = [
    '0-go-to-station-1', 
    '2-go-to-station-2', 
    '4-go-to-station-3', 
    '5-go-to-station-4', 
    '6-go-to-station-5', 
    '8-go-to-station-6', 
    '11-nexus'
  ];
  let visitedStations = new Set();
  let tourCompletedTriggered = false;

  document.addEventListener("DOMContentLoaded", function() {
      const currentYear = new Date().getFullYear();
      document.getElementById('dynamic-lites-title').innerText = "Welcome to LITES " + currentYear;
      document.getElementById('footer-year').innerText = currentYear;
      
      // Start tracking using the structural DOM elements instead of the framework window object
      initializeDOMTracker();
  });

  /* Form Submission Handler */
  function handleFormSubmit(event) {
      event.preventDefault(); 
      
      const participantName = document.getElementById('guest-name').value;
      const organisationName = document.getElementById('guest-org').value;
      const designation = document.getElementById('guest-designation').value;

      localStorage.setItem('lites_guest_name', participantName);
      localStorage.setItem('lites_guest_org', organisationName);
      localStorage.setItem('lites_guest_title', designation);

      const overlay = document.getElementById('welcome-overlay');
      overlay.classList.add('fade-out');
      
      if (window.chatbase) {
          window.chatbase("show");
      }
      
      setTimeout(() => {
          overlay.remove();
      }, 600);
  }

  /* BULLETPROOF FIXED TRACKER:
    Loops through the side menu directly. Marzipano adds an 'active' class to the link 
    or list item when a scene changes. If it finds the active scene, it logs it.
  */
  function initializeDOMTracker() {
      setInterval(() => {
          // Find all elements in your side menu list
          const sceneElements = document.querySelectorAll('#sceneList .scene');
          
          sceneElements.forEach(elem => {
              // Check if Marzipano has marked this specific scene as active
              if (elem.classList.contains('active') || elem.parentElement.classList.contains('active')) {
                  const sceneId = elem.getAttribute('data-id');
                  if (standardStations.includes(sceneId)) {
                      registerStation(sceneId);
                  }
              }
          });
      }, 500); // Check every half second
  }

  function registerStation(sceneId) {
      if (!visitedStations.has(sceneId)) {
          visitedStations.add(sceneId);
          
          // Force calculation based on elements registered
          const progressPercentage = (visitedStations.size / standardStations.length) * 100;
          const pb = document.getElementById('progress-bar');
          if (pb) {
              pb.style.width = progressPercentage + '%';
          }
      }

      // EMERGENCY OVERRIDE TRIPPED: 
      // If the progress bar element in your screenshot is visually full (width 100%),
      // or our script successfully verified all 7 stations, force the popup to show!
      const progressBarElement = document.getElementById('progress-bar');
      const visualWidth = progressBarElement ? progressBarElement.style.width : '';
      
      if ((visitedStations.size >= standardStations.length || visualWidth === '100%') && !tourCompletedTriggered) {
          tourCompletedTriggered = true;
          setTimeout(() => {
              triggerNetworkingPhaseOverlay();
          }, 500);
      }
  }

  function triggerNetworkingPhaseOverlay() {
      const name = localStorage.getItem('lites_guest_name') || 'Guest';
      const title = (localStorage.getItem('lites_guest_title') || '').toLowerCase();
      
      const recTag = document.getElementById('profile-recommendation-box');
      let targetedButtonId = 'booth-management'; 
      let recommendationLabel = 'Operations & Risk Control';

      if (title.includes('logistics') || title.includes('warehouse') || title.includes('operation')) {
          targetedButtonId = 'booth-logistics';
          recommendationLabel = 'Intralogistics & Warehouse Automation';
      } else if (title.includes('procurement') || title.includes('buyer') || title.includes('sourcing') || title.includes('supply chain')) {
          targetedButtonId = 'booth-procurement';
          recommendationLabel = 'Digital Procurement & Sustainable Sourcing';
      } else if (title.includes('manager') || title.includes('founder') || title.includes('director') || title.includes('executive') || title.includes('ceo')) {
          targetedButtonId = 'booth-nexus';
          recommendationLabel = 'Executive Innovation Strategy Nexus';
      }

      if (recTag) {
          recTag.innerHTML = `👋 Hi <strong>${name}</strong>, based on your industry profile, we highly recommend starting at <strong>${recommendationLabel}</strong>!`;
      }
      
      const targetBtn = document.getElementById(targetedButtonId);
      if (targetBtn) {
          targetBtn.classList.add('recommended-booth-highlight');
      }

      // Unhide the completed layout modal frame
      const netOverlay = document.getElementById('networking-overlay');
      if (netOverlay) {
          netOverlay.style.display = 'flex';
      }

      // Display shortcut circle icon next to chat bot
      const dynamicBoothShortcut = document.getElementById('booth-shortcut-btn');
      if (dynamicBoothShortcut) {
          dynamicBoothShortcut.style.display = 'flex';
          setTimeout(() => {
              dynamicBoothShortcut.style.opacity = '1';
          }, 50);
      }
  }

  function openBoothsModal() {
      const netOverlay = document.getElementById('networking-overlay');
      if (netOverlay) netOverlay.style.display = 'flex';
  }

  function selectNetworkingBooth(sceneId) {
      const netOverlay = document.getElementById('networking-overlay');
      if (netOverlay) netOverlay.style.display = 'none';
      
      if (typeof switchScene === "function") {
          switchScene(sceneId);
      } else {
          const alternativeTrigger = document.querySelector(`.scene[data-id="${sceneId}"]`);
          if (alternativeTrigger) alternativeTrigger.click();
      }
  }
</script>
